global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: weakseq

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: weakseq-node
    metrics_path: /metrics
    static_configs:
      - targets: ["weakseq-node:8081"]
        labels:
          component: sequencer

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
